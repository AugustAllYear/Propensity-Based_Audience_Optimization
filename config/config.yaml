# Propensity‑Based Audience Optimization Configuration

data:
  n_customers: 5000
  random_state: 42
  sent_prob: 0.8

features:
  numeric:
    - age
    - income
    - tenure
    - last_purchase_days
    - avg_order_value
  categorical:
    - campaign_channel
    - campaign_type
  engineering:               
    enabled: false
    velocity: false
    window_hours: 1
    z_score: true
    rolling_fraud: false
    window_transactions: 7
    card_age: false

model:
  random_forest:
    n_estimators: 100
    random_state: 42
    class_weight: null
  xgboost:
    n_estimators: 100
    random_state: 42
    eval_metric: logloss

training:
  test_size: 0.2
  random_state: 42

targeting:
  top_percent: 0.3
  simulation_months: 6
  random_initial_months: 3

paths:
  models: models/
  images: images/
  data_processed: data/processed/

mlflow:
  experiment_name: Propensity_Optimization
  tracking_uri: null

dashboard:
  title: "Propensity‑Based Audience Optimization Dashboard"
  default_top_percent: 0.3
  page_layout: "wide"
  simulation_chart: true

cost_benefit:
  default_cost_per_email: 0.05
  default_conversion_rate: 0.1
  default_avg_order_value: 100  